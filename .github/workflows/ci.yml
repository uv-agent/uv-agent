name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run tests
        run: uv run pytest

      - name: Install uv-agentx dependencies
        run: uv sync --project packages/uv-agentx --locked --dev

      - name: Run uv-agentx tests
        run: uv run --project packages/uv-agentx pytest packages/uv-agentx/tests

      - name: Build uv-agentx
        run: uv build packages/uv-agentx --out-dir dist/uv-agentx

name: Release uv-agentx

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.1.0. Leave empty to use packages/uv-agentx/pyproject.toml."
        required: false
        type: string

jobs:
  build:
    name: Build and verify uv-agentx distributions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import re
          import tomllib

          input_version = os.environ.get("INPUT_VERSION", "").strip()
          with open("packages/uv-agentx/pyproject.toml", "rb") as file:
              current_version = tomllib.load(file)["project"]["version"]

          version = input_version or current_version
          if not re.fullmatch(r"\d+\.\d+\.\d+(?:(?:a|b|rc)\d+)?(?:\.post\d+)?(?:\.dev\d+)?", version):
              raise SystemExit(f"Invalid release version: {version!r}")

          print(f"version={version}")
          PY

      - name: Update version files
        shell: bash
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          version = "${{ steps.meta.outputs.version }}"
          files = [
              (
                  Path("packages/uv-agentx/pyproject.toml"),
                  r'^(version = ")([^"]+)(")(\r?)$',
                  rf"\g<1>{version}\g<3>\g<4>",
              ),
              (
                  Path("packages/uv-agentx/src/uv_agentx/__init__.py"),
                  r'^(__version__ = ")([^"]+)(")(\r?)$',
                  rf"\g<1>{version}\g<3>\g<4>",
              ),
          ]
          for path, pattern, replacement in files:
              text = path.read_text(encoding="utf-8", newline="")
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.MULTILINE)
              if count != 1:
                  raise SystemExit(f"Expected exactly one version match in {path}")
              path.write_text(updated, encoding="utf-8", newline="")
          PY
          uv lock --project packages/uv-agentx

      - name: Verify version files
        shell: bash
        run: |
          python3 - <<'PY'
          import re
          import tomllib
          from pathlib import Path

          project_dir = Path("packages/uv-agentx")
          with (project_dir / "pyproject.toml").open("rb") as file:
              pyproject_version = tomllib.load(file)["project"]["version"]

          namespace = {}
          exec((project_dir / "src/uv_agentx/__init__.py").read_text(encoding="utf-8"), namespace)
          package_version = namespace.get("__version__")
          if package_version != pyproject_version:
              raise SystemExit(
                  f"uv_agentx.__version__={package_version!r} does not match "
                  f"pyproject.toml version={pyproject_version!r}"
              )

          lock_text = (project_dir / "uv.lock").read_text(encoding="utf-8")
          lock_versions = re.findall(
              r'\[\[package\]\]\r?\nname = "uv-agentx"\r?\nversion = "([^"]+)"',
              lock_text,
              flags=re.MULTILINE,
          )
          if lock_versions != [pyproject_version]:
              raise SystemExit(
                  f"uv.lock has uv-agentx versions {lock_versions!r}, "
                  f"but pyproject.toml has version={pyproject_version!r}. Run `uv lock --project packages/uv-agentx`."
              )
          PY

      - name: Commit version bump
        id: version-commit
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/uv-agentx/pyproject.toml packages/uv-agentx/uv.lock packages/uv-agentx/src/uv_agentx/__init__.py
          if git diff --cached --quiet; then
            echo "No uv-agentx version changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Release uv-agentx ${RELEASE_VERSION}"
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: uv sync --project packages/uv-agentx --locked --dev

      - name: Run tests
        run: uv run --project packages/uv-agentx pytest packages/uv-agentx/tests

      - name: Build distributions
        run: uv build packages/uv-agentx --out-dir dist

      - name: Check distributions
        run: uvx twine check --strict dist/*

      - name: Push version bump
        if: ${{ steps.version-commit.outputs.committed == 'true' }}
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "Version bump commits require running the workflow from a branch." >&2
            exit 1
          fi
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: uv-agentx-python-distributions
          path: dist/*
          if-no-files-found: error

  pypi:
    name: Publish uv-agentx to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi-uv-agentx
      url: https://pypi.org/p/uv-agentx
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: uv-agentx-python-distributions
          path: dist

      # Uses PyPI Trusted Publishing (OIDC). Configure PyPI with this workflow
      # file and the "pypi-uv-agentx" environment, so no API token secret is needed.
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true

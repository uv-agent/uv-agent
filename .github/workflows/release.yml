name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.12.0. Leave empty to use pyproject.toml."
        required: false
        type: string
      tag:
        description: "Release tag. Leave empty to use v<version>."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: true
        default: false
        type: boolean
      publish_pypi:
        description: "Publish the built distributions to PyPI after creating the GitHub release."
        required: true
        default: false
        type: boolean

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      commit_sha: ${{ steps.release-ref.outputs.commit_sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import re
          import tomllib

          input_version = os.environ.get("INPUT_VERSION", "").strip()
          with open("pyproject.toml", "rb") as file:
              current_version = tomllib.load(file)["project"]["version"]

          version = input_version or current_version
          if not re.fullmatch(r"\d+\.\d+\.\d+(?:(?:a|b|rc)\d+)?(?:\.post\d+)?(?:\.dev\d+)?", version):
              raise SystemExit(f"Invalid release version: {version!r}")

          tag = os.environ.get("INPUT_TAG", "").strip() or f"v{version}"
          if not re.fullmatch(r"v?[A-Za-z0-9][A-Za-z0-9._+-]*", tag):
              raise SystemExit(f"Invalid release tag: {tag!r}")

          tag_version = tag[1:] if tag.startswith("v") else tag
          if tag_version != version:
              raise SystemExit(
                  f"Release tag {tag!r} does not match release version {version!r}. "
                  "Use the matching tag or leave tag empty."
              )

          print(f"version={version}")
          print(f"tag={tag}")
          PY

      - name: Update version files
        run: python scripts/bump_version.py ${{ steps.meta.outputs.version }}

      - name: Verify version files
        run: python scripts/bump_version.py --check

      - name: Commit version bump
        id: version-commit
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock src/uv_agent/__init__.py
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Release uv-agent ${RELEASE_TAG}"
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run tests
        run: uv run pytest

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: uvx twine check --strict dist/*

      - name: Push version bump
        if: ${{ steps.version-commit.outputs.committed == 'true' }}
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "Version bump commits require running the workflow from a branch." >&2
            exit 1
          fi
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Resolve release revision
        id: release-ref
        shell: bash
        run: echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  github-release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-distributions
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          target_commitish: ${{ needs.build.outputs.commit_sha }}
          name: uv-agent ${{ needs.build.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true
          files: dist/*

  pypi:
    name: Publish to PyPI
    needs:
      - build
      - github-release
    if: ${{ inputs.publish_pypi }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/uv-agent
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-distributions
          path: dist

      # Uses PyPI Trusted Publishing (OIDC). Configure PyPI with this workflow
      # file and the "pypi" environment, so no API token secret is needed.
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true

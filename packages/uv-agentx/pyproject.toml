[project]
name = "uv-agentx"
version = "0.1.1"
description = "Small uvx-based launcher for uv-agent plugin sets"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
dependencies = []

[project.urls]
Repository = "https://github.com/4fuu/uv-agent"

[project.scripts]
uv-agentx = "uv_agentx.cli:main"

[dependency-groups]
dev = ["pytest>=9.0.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/uv_agentx"]

name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag. Leave empty to use v<pyproject.toml version>."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: true
        default: false
        type: boolean
      publish_pypi:
        description: "Publish the built distributions to PyPI after creating the GitHub release."
        required: true
        default: false
        type: boolean

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import re
          import tomllib

          with open("pyproject.toml", "rb") as file:
              version = tomllib.load(file)["project"]["version"]

          tag = os.environ.get("INPUT_TAG", "").strip() or f"v{version}"
          if not re.fullmatch(r"v?[A-Za-z0-9][A-Za-z0-9._+-]*", tag):
              raise SystemExit(f"Invalid release tag: {tag!r}")

          tag_version = tag[1:] if tag.startswith("v") else tag
          if tag_version != version:
              raise SystemExit(
                  f"Release tag {tag!r} does not match pyproject.toml version {version!r}. "
                  "Update pyproject.toml or rerun with the matching tag."
              )

          print(f"version={version}")
          print(f"tag={tag}")
          PY

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run tests
        run: uv run pytest

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: uvx twine check --strict dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  github-release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: uv-agent ${{ needs.build.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true
          files: dist/*

  pypi:
    name: Publish to PyPI
    needs:
      - build
      - github-release
    if: ${{ inputs.publish_pypi }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/uv-agent
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      # Uses PyPI Trusted Publishing (OIDC). Configure PyPI with this workflow
      # file and the "pypi" environment, so no API token secret is needed.
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
